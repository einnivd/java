<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Math 객체</title>
  </head>
  <body>
    <script>
      let num = 2.623;
      // max() : 주어진 숫자 중 가장 큰 값
      let maxNum = Math.max(10, 5, 8, 30);
      console.log(maxNum); // 30
      // min() : 주어진 숫자 중 가장 작은 값
      let minNum = Math.min(10, 5, 8, 30);
      console.log(minNum); // 5
      // round() : 소수 첫 번째 자리에서 반올림
      let roundNum = Math.round(num);
      console.log(roundNum); // 2.623 을 소수 첫 번째 자리에서 반올림 --> 3
      // floor() : 소수점을 내림하여 정수로 변환
      let floorNum = Math.floor(num);
      console.log(floorNum);
      // ceil() : 소수점을 올림하여 정수로 변환
      let ceilNum = Math.ceil(num);
      console.log(ceilNum);
      // random() : 0 초과 1 미만의 난수 (예 : 0.3279104055761993)
      let randomNum = Math.random();
      console.log(randomNum);
      //  PI 원주율 값을 반환
      let piNum = Math.PI;
      console.log(piNum); // 3.141592653589793
    </script>
  </body>
</html>
