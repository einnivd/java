<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>뒤로가기 페이지</title>
</head>
<body>
    <button onclick="goback()">뒤로가기</button>
    <script>
        function goback(){
            history.back() // back() : 뒤로가기 메서드
            // history.forward() // forward() : 앞으로가기 메서드
            // history.go(-1) // go() : 뒤로 1페이지 가기 메서드
        }
    </script>
</body>
</html>
