<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>가위 바위 보 게임</title>
  </head>
  <body>
    <h1>가위 바위 보 게임</h1>
    
    <script>
      let game = prompt("가위, 바위, 보 중 선택해주세요.");
      let gameNum;
      switch (game) {
        case "가위":
          gameNum = 1;
          break;
        case "바위":
          gameNum = 2;
          break;
        case "보":
          gameNum = 3;
          break;
        default:
          alert("잘못 작성했습니다. 가위, 바위, 보 중에서 선택");
      }
      let com = Math.floor((Math.random() * 3) + 1); // 1,2,3
      //   console.log(com);
      document.write(`${com}`)
      document.write(`<img src="image/math_img_${com}.jpg" alt="이미지${com}">`);
      if(gameNum === com){
        document.write(`<img src="image/game_1.jpg" alt="성공 이미지">`)
      }else{
        document.write(`<img src="image/game_2.jpg" alt="실패 이미지">`)
      }
    </script>
  </body>
</html>
