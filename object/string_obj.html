<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>String 객체</title>
</head>
<body>
    <script>
        // 1.length 속성
        const str = "Hello, JavaScript"
        console.log(`1.length : ${str.length}`);
        console.log("1.length :", str.length);

        // 2.toUpperCase() toLowerCase()
        const text = "Hello"
        console.log(`2.toUpperCase()대문자 : ${text.toUpperCase()}`); // 대문자로 바꾸는 메서드
        console.log(`2.toLowerCase()소문자 : ${text.toLowerCase()}`); // 소문자로 바꾸는 메서드

        // 3.includes()
        const email = "user@example.com"
        console.log(`3.@ 포함여부 : ${email.includes("@")}`);
        
        // 4.trim()
        const input = " Hello"
        console.log(input.length); // 6
        console.log(input.trim().length); // 단어 앞의 공백(띄어쓰기)을 제외한 문자의 길이 // 5
    
        // 5.slice()
        const srt2 = "JavaScript"
        // slice(시작 인덱스(포함), 끝 인덱스(미포함, 바로 앞까지만 자름))
        console.log(`부분 문자열 : ${srt2.slice(0,4)}`); // 0번째 문자 ~ 3번째 문자 // Java
        console.log(`부분 문자열 : ${srt2.slice(4,6)}`); // 4번째 문자 ~ 5번째 문자 // Java

        // 6.replace()
        const sentence = "I like Java"
        console.log(`6.문자열 교체 : ${sentence.replace("Java" , "JavaScript")}`); // Java 를 JavaScript 로 교체
        
        // 7.Split()
        const data = "apple,banana,orange"
        console.log(`7.문자열 분리 :${data.split("")}`);
        
        
        
        
    </script>
</body>
</html>
