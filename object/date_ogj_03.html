<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>date 객체 활용하여 날짜 선택 기록하기</title>
    <style>
      :root {
        --primary-color: #4caf50;
        --primary-hover-color: #337435;
        --secondary-color: #ff9800;
        --bg-color: #dadada;
        --text-white-color: #fff;
        --text-color: #333;
        --font-family: "Segoe UI", sans-serif;
        /* 간격 */
        --space-s: 10px;
        --space-m: 15px;
        --space-l: 20px;
        --space-xl: 50px;
        /* 그림자 */
        --shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
      }
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        background-color: var(--bg-color);
        color: var(--text-color);
        font-family: var(--font-family);
      }
      header {
        background-color: var(--primary-color);
        color: var(--text-white-color);
        padding: var(--space-l);
        text-align: center;
      }
      .container {
        width: 50%;
        margin: var(--space-xl) auto;
        /* background-color: var(--secondary-color); */
      }
      .card {
        background-color: var(--text-white-color);
        padding: var(--space-m);
        border-radius: 12px;
        box-shadow: var(--shadow);
      }
      h2 {
        color: var(--primary-color);
      }
      #date_form {
        display: flex;
        flex-direction: column;
        gap: var(--space-s);
        margin-top: var(--space-m);
      }
      input,
      button {
        padding: var(--space-s);
        border-radius: 8px;
        border: 1px solid #ccc;
        font-size: 16px;
      }
      button {
        background-color: var(--primary-color);
        color: var(--text-white-color);
        cursor: pointer;
      }
      button:hover {
        background-color: var(--primary-hover-color);
      }
      .log {
        background-color: #eee;
        padding: var(--space-s);
        margin-top: var(--space-m);
        border-radius: 8px;
      }
    </style>
  </head>
  <body>
    <header>
      <h1>Date 객체 활용하여 날짜 선택하기</h1>
    </header>
    <div class="container">
      <div class="card">
        <h2>날짜 선택 및 기록 날짜</h2>
        <form class="date-form" id="date_form">
          <label for="date">날짜 선택</label>
          <input type="date" name="date" id="userDate" />
          <button type="submit">기록하기</button>
          

        </form>
         <div class="log" id="log">
              <!-- js출력 -->
            </div>
      </div>
    </div>

    <script>
      const form = document.getElementById("date_form");
      const log = document.getElementById("log");
      form.addEventListener("submit", (e) => {
        e.preventDefault();
        const userDate = new Date(document.getElementById("userDate").value);
        // const formDate = userDate.toLocaleDateString();
        // console.log(userDate); // 사용자가 선택한 날짜
        const now = new Date().toLocaleDateString();
        // console.log(now); // 사용자가 등록한 날짜
        log.innerHTML += `
           <p>
            <strong>선택된 날짜:${userDate.toLocaleDateString()}</strong> <br>
            (사용자가 등록한 날짜 :${now})
           </p>
           <hr>
             `;
             document.getElementById("uswerDate").value =""
      });
    </script>
  </body>
</html>
