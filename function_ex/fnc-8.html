<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>함수 예제 - 메뉴 토글</title>
</head>
<body>
    <h1 class="title">안녕하세요🥰</h1>
    <!-- button#btn{글자 바꾸기😋😊} -->
    <button id="btn">글자 바꾸기😋😊</button>

    <script>
        const title = document.querySelector("#title");
        const btn = document.querySelector("#btn");
        function toggleTxt(){
            if(title.innerText === "안녕하세요🥰"){
                title.innerText = "반가워요😐";
            }else{
                title.innerText = "안녕하세요🥰";
            }
        }
        let isHello = true;
        function toggleTxt(){
            isHello = !isHello
            // console.log(isHello);
            // ?를 기점으로 (참):(거짓)
            title.innerText = isHello ? "안녕하세요🥰" : "반가워요😐"
            
        }
        btn.addEventListener("click" , toggleTxt);

    </script>
</body>
</html>
