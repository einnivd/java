<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>함수 예제 3</title>
</head>
<body>
    <button onclick="changeColor('skyblue')">하늘색</button>
    <button onclick="changeColor('pink')">핑크색</button>
    <button onclick="changeColor('yellow')">노랑색</button>
    <button onclick="changeColor('green')">초록색</button>
    <button onclick="changeColor('blue')">파란색</button>
    <script>
        function changeColor(bg){
            console.log(bg);
            document.body.style.backgroundColor = bg
        }
    </script>
</body>
</html>
