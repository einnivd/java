<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>요소 생성</title>
  </head>
  <body>
    <div id="container">
      <h1>웹 프로그래밍</h1>
      <!-- p태그 생성 -->
      <!-- <p>DOM은 document object model의 줄임말이다.</p> -->
    </div>
    <div class="notice">
      <!-- js출력 <span>안녕하세요</span> -->
    </div>
    <script>
      // p태그 생성
      const newP = document.createElement("p");
      console.log(newP);
      const txtNode = document.createTextNode(
        "DOM은 document object model의 줄임말이다.",
      );
      console.log(txtNode);
      // p태그에 글자를 넣는다.
      newP.appendChild(txtNode);
      // container 영역 안에 p태그 연결
      document.getElementById("container").appendChild(newP);

      // span태그 생성
      const newSpan = document.createElement("span");
      const txtNode2 = document.createTextNode("안녕하세요");
      // span태그에 글자를 넣는다.
      newSpan.appendChild(txtNode2);
      // notice 영역 안에 span태그 연결
      document.querySelector(".notice").appendChild(newSpan);
    </script>
  </body>
</html>
